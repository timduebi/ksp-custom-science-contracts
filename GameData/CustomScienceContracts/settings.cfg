// ============================================================================
//  CustomScienceContracts - Settings
//  Values here override the defaults in Core/Tuning.cs.
// ============================================================================

CUSTOM_SCIENCE_CONTRACTS_SETTINGS
{
    // --- Visibility limits for available missions ---
    visibleBemanntBase      = 3      // Pioneers: visible at campaign start
    visibleBemanntBoosted   = 5      // Pioneers: visible after enough completions
    bemanntBoostFraction    = 0.5
    visibleErkundungPerSub  = 4      // Robotic Explorers: per subcategory
    visibleStationenPerSub  = 3      // Stations: per subcategory (body)
    visibleNetzwerkPerSub   = 3      // Lifelines: per subcategory

    // --- Active limits ---
    activeBemannt           = 4      // 4 since 0.6: keeps a crewed slot free besides ops
    activeErkundung         = 10
    activeStationen         = 5      // station/base/depot chains incl. 150-day operations
    activeNetzwerk          = 5

    // --- Repeatable missions ---
    repeatableCooldown      = 2

    // --- Precision landing markers ---
    markerRadiusKmDefault   = 15     // km; individual contracts may override through radiusKm

    // --- Check loop ---
    checkIntervalSeconds    = 1.0

    // --- Mission Control window ---
    missionCenterScale      = 0.96   // 0.55 - 1.00, initial size when the window opens
    uiScale                 = 1.0    // 0.8 - 1.6, scales all mod windows (high-DPI displays)

    // --- Notifications ---
    showToasts              = true   // on-screen messages (ready / claim / unlock / epoch)
    playSounds              = true   // soft chime when a mission becomes claimable

    // --- Diagnostics / testing ---
    verboseLogging          = false
    unlockAll               = false
    selfTest                = false  // run the logic self-test once at startup (log output)
}
