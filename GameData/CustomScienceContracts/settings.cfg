// ===========================================================================
//  CustomScienceContracts — Einstellungen
//  Alle Werte sind optional; fehlt einer, gilt der eingebaute Default (hier gezeigt).
//  Wird beim Laden eines Spielstands eingelesen. Aenderungen wirken nach Neustart/Neuladen.
// ===========================================================================

CUSTOM_SCIENCE_CONTRACTS_SETTINGS
{
    // --- Sichtbarkeit im Auswahlfenster (gleichzeitig angezeigte offene Contracts) ---
    visibleBemanntBase      = 3      // Bemannt: sichtbar zu Beginn
    visibleBemanntBoosted   = 5      // Bemannt: sichtbar, sobald genug abgeschlossen
    bemanntBoostFraction    = 0.5    // ab diesem Anteil erledigter bemannter Contracts -> Boost
    visibleErkundungPerSub  = 4      // Erkundung: pro Unterkategorie (faellt weg nach revealAllAfter)
    visibleNetzwerkPerSub   = 3      // Netzwerk: pro Unterkategorie

    // --- Aktiv-Limits (gleichzeitig angenommene Missionen) ---
    activeBemannt           = 3
    activeErkundung         = 10
    activeNetzwerk          = 5

    // --- Wiederholbare Missionen ---
    repeatableCooldown      = 2      // so viele ANDERE Abschluesse, bis wieder annehmbar

    // --- Marker-Landung (einzelne Contracts ueberschreiben dies via radiusKm) ---
    markerRadiusKmDefault   = 15     // Standard-Radius (km)
    markerRadiusKmResupply  = 5      // Referenzwert fuer Versorgung/Rotation

    // --- Pruef-Loop ---
    checkIntervalSeconds    = 1.0    // Sekunden zwischen den Bedingungspruefungen

    // --- Diagnose ---
    verboseLogging          = false  // bei Bedarf fuer ausfuehrliche [CSC][v]-Zeilen aktivieren
    unlockAll               = false  // TEST: echte Sperrlogik aktiv (damit gesperrte Auftraege + Vorschau sichtbar)
}
