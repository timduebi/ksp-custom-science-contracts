name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Fetch transient KSP 1.12.5 reference assemblies
        run: |
          curl -L --fail --retry 3 -o /tmp/ksp-libs.zip https://github.com/KSPModdingLibs/KSPLibs/raw/main/KSP-1.12.5.zip
          mkdir -p "$GITHUB_WORKSPACE/.ksp-managed"
          unzip -j /tmp/ksp-libs.zip '*.dll' -d "$GITHUB_WORKSPACE/.ksp-managed"
      - name: Build, test and package reproducibly
        run: python tools/release.py --ksp-managed "$GITHUB_WORKSPACE/.ksp-managed"
      - name: Publish stable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" compiled/release-v"$VERSION"/*.zip compiled/release-v"$VERSION"/SHA256SUMS.txt \
            --title "KSP Custom Science Contracts $GITHUB_REF_NAME" \
            --notes-file tools/release_notes.md --latest
